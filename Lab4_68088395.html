<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Lab4_68088395.css">
    <title>Image-Slider</title>
</head>
<body>

<!-- ===== Popup ===== -->
<div id="popup1" class="popup">
    <a href="#slider1" class="close">&times;</a>
    <img src="s1.jpg">
</div>

<div id="popup2" class="popup">
    <a href="#slider2" class="close">&times;</a>
    <img src="s2.jpg">
</div>

<div id="popup3" class="popup">
    <a href="#slider3" class="close">&times;</a>
    <img src="s3.jpg">
</div>

<div id="popup4" class="popup">
    <a href="#slider4" class="close">&times;</a>
    <img src="s4.jpg">
</div>

<div id="popup5" class="popup">
    <a href="#slider5" class="close">&times;</a>
    <img src="s5.jpg">
</div>

<div id="popup6" class="popup">
    <a href="#slider6" class="close">&times;</a>
    <img src="s6.jpg">
</div>

<div id="popup7" class="popup">
    <a href="#slider7" class="close">&times;</a>
    <img src="s7.jpg">
</div>

<!-- ===== Slider ===== -->
<div class="container">

    <span id="slider1"></span>
    <span id="slider2"></span>
    <span id="slider3"></span>
    <span id="slider4"></span>
    <span id="slider5"></span>
    <span id="slider6"></span>
    <span id="slider7"></span>

    <div class="imgContainer">

        <div class="slide_div">
            <img src="s1.jpg" class="img" id="img1">
            <a href="#slider1" class="button"></a>
            <a href="#popup1"></a>
        </div>

        <div class="slide_div">
            <img src="s2.jpg" class="img" id="img2">
            <a href="#slider2" class="button"></a>
            <a href="#popup2"></a>
        </div>

        <div class="slide_div">
            <img src="s3.jpg" class="img" id="img3">
            <a href="#slider3" class="button"></a>
            <a href="#popup3"></a>
        </div>

        <div class="slide_div">
            <img src="s4.jpg" class="img" id="img4">
            <a href="#slider4" class="button"></a>
            <a href="#popup4"></a>
        </div>

        <div class="slide_div">
            <img src="s5.jpg" class="img" id="img5">
            <a href="#slider5" class="button"></a>
            <a href="#popup5"></a>
        </div>

        <div class="slide_div">
            <img src="s6.jpg" class="img" id="img6">
            <a href="#slider6" class="button"></a>
            <a href="#popup6"></a>
        </div>

        <div class="slide_div">
            <img src="s7.jpg" class="img" id="img7">
            <a href="#slider7" class="button"></a>
            <a href="#popup7"></a>
        </div>

    </div>
</div>

</body>
</html>
